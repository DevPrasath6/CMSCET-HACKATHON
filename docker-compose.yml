version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: alloy_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: alloy_alchemy_production
    volumes:
      - mongodb_data:/data/db
      - ./backend/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - alloy_network

  redis:
    image: redis:7-alpine
    container_name: alloy_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alloy_network

  backend:
    build: ./backend
    container_name: alloy_django
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,0.0.0.0
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - alloy_network

  celery:
    build: ./backend
    container_name: alloy_celery
    restart: always
    environment:
      - DEBUG=True
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    command: celery -A alloy_backend worker --loglevel=info
    networks:
      - alloy_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alloy_frontend
    restart: always
    ports:
      - "80:80"
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000/api
      - NODE_ENV=production
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - alloy_network

volumes:
  mongodb_data:
  redis_data:

networks:
  alloy_network:
    driver: bridge
